services:
  influxdb:
    image: influxdb:2.7
    container_name: power-meter-influxdb
    restart: always
    ports:
      - '8086:8086'
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: spyshow/power-meter:backend
    container_name: power-meter-backend
    restart: always
    ports:
      - '3001:3001'
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - PAS600_IP=${PAS600_IP}
      - PAS600_PORT=${PAS600_PORT}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: spyshow/power-meter:frontend
    container_name: power-meter-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:80/']
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: nickfedor/watchtower
    container_name: power-meter-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true

networks:
  power-meter-network:
    driver: bridge

volumes:
  influxdb-data:
