services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: power-meter-timescaledb
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: spyshow/power-meter:backend
    container_name: power-meter-backend
    restart: always
    ports:
      - '3001:3001'
    volumes:
      - ./reports:/app/reports
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PAS600_IP=${PAS600_IP}
      - PAS600_PORT=${PAS600_PORT}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: spyshow/power-meter:frontend
    container_name: power-meter-frontend
    restart: always
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:80/']
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: nickfedor/watchtower
    container_name: power-meter-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true

networks:
  power-meter-network:
    driver: bridge

volumes:
  timescaledb-data:
