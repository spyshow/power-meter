services:
  influxdb:
    image: influxdb:2.7
    container_name: power-meter-influxdb
    ports:
      - '8086:8086'
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD:-password123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-my-org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-modbus_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: spyshow/power-meter:backend
    container_name: power-meter-backend
    ports:
      - '3001:3001'
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-my-org}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-modbus_data}
      - PAS600_IP=${PAS600_IP:-172.16.0.80}
      - PAS600_PORT=${PAS600_PORT:-502}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    image: spyshow/power-meter:frontend
    container_name: power-meter-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:80/']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  power-meter-network:
    driver: bridge

volumes:
  influxdb-data:
