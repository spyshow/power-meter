services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: power-meter-timescaledb
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-power_meter}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-power_meter}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: spyshow/power-meter:backend
    container_name: power-meter-backend
    ports:
      - '3001:3001'
    volumes:
      - ./reports:/app/reports
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://admin:password123@timescaledb:5432/power_meter}
      - PAS600_IP=${PAS600_IP:-172.16.0.80}
      - PAS600_PORT=${PAS600_PORT:-502}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    image: spyshow/power-meter:frontend
    container_name: power-meter-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - power-meter-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:80/']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  power-meter-network:
    driver: bridge

volumes:
  timescaledb-data:
